name: Auto Tag

on:
  push:
    branches: [main]

# Only one auto-tag run at a time. If a second push lands while one is
# already running, queue it rather than cancelling — we want every push
# to eventually get a version bump.
concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  tag:
    name: Bump version and tag
    runs-on: ubuntu-latest
    # Skip commits that the bot itself pushed (the release bump commits)
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the pushed tag triggers release.yml
          # (pushes from GITHUB_TOKEN do not trigger other workflows)
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Pull the latest state of main so we always start from the
      # most recently committed package.json, not the version at the
      # time the trigger fired (which may be stale if a concurrent run
      # already bumped it).
      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Determine version bump
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -q '\[major\]'; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -q '\[minor\]'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump package.json version
        id: version
        run: |
          BUMP=${{ steps.bump.outputs.bump }}
          NEW_VERSION=$(npm version $BUMP --no-git-tag-version)
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Bumped to ${NEW_VERSION}"

      - name: Check tag does not already exist
        run: |
          TAG=${{ steps.version.outputs.new_version }}
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping release."
            echo "skip=true" >> $GITHUB_ENV
          else
            echo "skip=false" >> $GITHUB_ENV
          fi

      - name: Update WAIRON_VERSION in defaults.ts
        if: env.skip == 'false'
        run: |
          VERSION=${{ steps.version.outputs.new_version }}
          VERSION=${VERSION#v}
          sed -i "s/export const WAIRON_VERSION = '[^']*'/export const WAIRON_VERSION = '${VERSION}'/" src/config/defaults.ts

      - name: Commit and tag
        if: env.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src/config/defaults.ts
          git commit -m "chore: release ${{ steps.version.outputs.new_version }}"
          git tag ${{ steps.version.outputs.new_version }}
          git push origin main
          git push origin ${{ steps.version.outputs.new_version }}
