name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            target: windows-x64
            pkg_target: node20-win-x64
            asset_ext: .zip

          # Linux x64
          - os: ubuntu-latest
            target: linux-x64
            pkg_target: node20-linux-x64
            asset_ext: .tar.gz

          # Linux ARM64
          - os: ubuntu-latest
            target: linux-arm64
            pkg_target: node20-linux-arm64
            asset_ext: .tar.gz

          # macOS x64
          - os: macos-13
            target: macos-x64
            pkg_target: node20-macos-x64
            asset_ext: .tar.gz

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: macos-arm64
            pkg_target: node20-macos-arm64
            asset_ext: .tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Build binary (${{ matrix.target }})
        run: |
          pkg dist/cli/index.js \
            --target ${{ matrix.pkg_target }} \
            --output waffagent \
            --compress GZip

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package (Unix tar.gz)
        if: matrix.asset_ext == '.tar.gz'
        run: |
          mv waffagent waffagent-bin
          mkdir waffagent-pkg
          mv waffagent-bin waffagent-pkg/waffagent
          chmod +x waffagent-pkg/waffagent
          tar -czf waffagent-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz -C waffagent-pkg waffagent

      - name: Package (Windows zip)
        if: matrix.asset_ext == '.zip'
        shell: pwsh
        run: |
          Rename-Item -Path "waffagent.exe" -NewName "waffagent-bin.exe" -ErrorAction SilentlyContinue
          if (!(Test-Path "waffagent-bin.exe")) { Rename-Item "waffagent" "waffagent-bin.exe" }
          New-Item -ItemType Directory -Path waffagent-pkg
          Copy-Item "waffagent-bin.exe" "waffagent-pkg\waffagent.exe"
          Compress-Archive -Path "waffagent-pkg\waffagent.exe" -DestinationPath "waffagent-${{ steps.version.outputs.version }}-${{ matrix.target }}.zip"

      - name: Generate checksum (Unix)
        if: matrix.asset_ext == '.tar.gz'
        run: |
          sha256sum waffagent-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz \
            > waffagent-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz.sha256

      - name: Generate checksum (Windows)
        if: matrix.asset_ext == '.zip'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "waffagent-${{ steps.version.outputs.version }}-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  waffagent-${{ steps.version.outputs.version }}-${{ matrix.target }}.zip" | Out-File -FilePath "waffagent-${{ steps.version.outputs.version }}-${{ matrix.target }}.zip.sha256" -Encoding utf8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            waffagent-${{ steps.version.outputs.version }}-${{ matrix.target }}${{ matrix.asset_ext }}
            waffagent-${{ steps.version.outputs.version }}-${{ matrix.target }}${{ matrix.asset_ext }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "waffagent ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
