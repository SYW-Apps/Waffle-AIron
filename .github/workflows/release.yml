name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            pkg_target: node20-win-x64
            asset_ext: .zip

          - os: ubuntu-latest
            target: linux-x64
            pkg_target: node20-linux-x64
            asset_ext: .tar.gz

          - os: ubuntu-latest
            target: linux-arm64
            pkg_target: node20-linux-arm64
            asset_ext: .tar.gz

          - os: macos-latest
            target: macos-x64
            pkg_target: node20-macos-x64
            asset_ext: .tar.gz

          - os: macos-latest
            target: macos-arm64
            pkg_target: node20-macos-arm64
            asset_ext: .tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript + copy assets
        run: npm run build

      - name: Build binary (${{ matrix.target }})
        shell: bash
        run: |
          npx --yes @yao-pkg/pkg dist/cli/index.js \
            --target ${{ matrix.pkg_target }} \
            --output wairon \
            --compress GZip \
            --config package.json

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Detect pre-release
        id: prerelease
        shell: bash
        run: |
          if echo "${GITHUB_REF_NAME}" | grep -qE '\-(beta|preview)\.[0-9]+$'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Package (Unix tar.gz)
        if: matrix.asset_ext == '.tar.gz'
        shell: bash
        run: |
          mkdir -p wairon-pkg
          # pkg on Linux/macOS outputs just "wairon" (no extension)
          cp wairon wairon-pkg/wairon 2>/dev/null || cp wairon-bin wairon-pkg/wairon
          chmod +x wairon-pkg/wairon
          tar -czf wairon-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz \
            -C wairon-pkg wairon

      - name: Package (Windows zip)
        if: matrix.asset_ext == '.zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path wairon-pkg -Force
          # pkg on Windows outputs "wairon.exe"
          Copy-Item "wairon.exe" "wairon-pkg\wairon.exe" -ErrorAction SilentlyContinue
          if (!(Test-Path "wairon-pkg\wairon.exe")) {
            Copy-Item "wairon" "wairon-pkg\wairon.exe"
          }
          Compress-Archive -Path "wairon-pkg\wairon.exe" `
            -DestinationPath "wairon-${{ steps.version.outputs.version }}-${{ matrix.target }}.zip" -Force

      - name: Generate checksum (Unix)
        if: matrix.asset_ext == '.tar.gz'
        run: |
          sha256sum wairon-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz \
            > wairon-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz.sha256

      - name: Generate checksum (Windows)
        if: matrix.asset_ext == '.zip'
        shell: pwsh
        run: |
          $file = "wairon-${{ steps.version.outputs.version }}-${{ matrix.target }}.zip"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
          "$hash  $file" | Out-File -FilePath "$file.sha256" -Encoding utf8NoBOM

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            wairon-${{ steps.version.outputs.version }}-${{ matrix.target }}${{ matrix.asset_ext }}
            wairon-${{ steps.version.outputs.version }}-${{ matrix.target }}${{ matrix.asset_ext }}.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Detect pre-release
        id: prerelease
        run: |
          if echo "${GITHUB_REF_NAME}" | grep -qE '\-(beta|preview)\.[0-9]+$'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "wairon ${{ github.ref_name }}"
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
