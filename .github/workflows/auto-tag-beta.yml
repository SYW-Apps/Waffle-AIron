name: Auto Tag (Beta)

on:
  push:
    branches: [beta]

# Only one auto-tag run at a time. If a second push lands while one is
# already running, queue it rather than cancelling — we want every push
# to eventually get a version bump.
concurrency:
  group: auto-tag-beta
  cancel-in-progress: false

jobs:
  tag:
    name: Bump beta version and tag
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the pushed tag triggers release.yml
          # (pushes from GITHUB_TOKEN do not trigger other workflows)
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Pull the latest state of beta so we always start from the
      # most recently committed package.json, not the version at the
      # time the trigger fired (which may be stale if a concurrent run
      # already bumped it).
      - name: Pull latest beta
        run: git pull --rebase origin beta

      - name: Compute next beta version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Strip any existing pre-release suffix to get the base semver
          BASE=$(echo "$CURRENT" | sed 's/-.*$//')

          # Check if current version already has a -beta.N suffix
          if echo "$CURRENT" | grep -qE '\-beta\.[0-9]+$'; then
            # Increment the beta counter
            N=$(echo "$CURRENT" | sed 's/.*-beta\.//')
            NEXT_N=$((N + 1))
            NEW_VERSION="${BASE}-beta.${NEXT_N}"
          else
            # First beta from this base — check commit for bump hints
            MSG="${{ github.event.head_commit.message }}"
            IFS='.' read -r MAJ MIN PAT <<< "$BASE"
            if echo "$MSG" | grep -q '\[major\]'; then
              MAJ=$((MAJ + 1)); MIN=0; PAT=0
            elif echo "$MSG" | grep -q '\[minor\]'; then
              MIN=$((MIN + 1)); PAT=0
            else
              PAT=$((PAT + 1))
            fi
            NEW_VERSION="${MAJ}.${MIN}.${PAT}-beta.1"
          fi

          echo "new_version=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "new_version_plain=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Next version: v${NEW_VERSION}"

      - name: Check tag does not already exist
        run: |
          TAG=${{ steps.version.outputs.new_version }}
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping release."
            echo "skip=true" >> $GITHUB_ENV
          else
            echo "skip=false" >> $GITHUB_ENV
          fi

      - name: Update package.json and defaults.ts
        if: env.skip == 'false'
        run: |
          VERSION_PLAIN=${{ steps.version.outputs.new_version_plain }}
          # Update package.json version field
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf-8'));
            pkg.version = '${VERSION_PLAIN}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          # Update WAIRON_VERSION in defaults.ts
          sed -i "s/export const WAIRON_VERSION = '[^']*'/export const WAIRON_VERSION = '${VERSION_PLAIN}'/" src/config/defaults.ts

      - name: Commit and tag
        if: env.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src/config/defaults.ts
          git commit -m "chore: release ${{ steps.version.outputs.new_version }}"
          git tag ${{ steps.version.outputs.new_version }}
          git push origin beta --tags
