schemaVersion: 1.0.0
name: gatekeeper-saas
targets:
  - type: claude
    outputDir: .claude/agents
    enabled: true
  - type: agy
    outputDir: .gemini/agents
    enabled: true
rules:
  noOverlappingOwnership: true
  requireOwnedPaths: true
  metaAgentTags:
    - meta
    - guardian
    - architect
  enforceReproducibility: true
paths:
  specsDir: .wai/specs
defaultBackend: claude
