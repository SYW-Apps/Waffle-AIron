component: billing-portal
methods:
  - name: create_customer
    description: Handles POST /customers to register a new user.
    signature: 'create_customer(req: HttpRequest): HttpResponse'
    returns: HttpResponse
    httpEndpoint:
      method: POST
      path: /customers
  - name: create_api_key
    description: Handles POST /keys to issue a key credential.
    signature: 'create_api_key(req: HttpRequest): HttpResponse'
    returns: HttpResponse
    httpEndpoint:
      method: POST
      path: /keys
