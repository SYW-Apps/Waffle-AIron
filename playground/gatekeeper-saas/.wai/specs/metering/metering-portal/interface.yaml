      method: POST
      path: /check
  - name: report_usage
    description: Handles POST /meter to increment usage count.
    signature: 'report_usage(req: HttpRequest): HttpResponse'
    returns: HttpResponse
    httpEndpoint:
      method: POST
      path: /meter
