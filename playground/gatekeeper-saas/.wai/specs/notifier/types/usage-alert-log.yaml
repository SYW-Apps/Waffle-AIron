kind: entity
id: usage-alert-log
name: UsageAlertLog
description: >-
  Tracks sent email notification warnings to prevent duplicate spamming within the same billing
  cycle.
subsystem: notifier
fields:
  - name: id
    type: String
    description: Unique identifier for the alert log.
    optional: false
  - name: subscription_id
    type: String
    description: ForeignKey pointing to the Subscription.
    optional: false
  - name: billing_period_start
    type: DateTime
    description: Billing period start when the alert was triggered.
    optional: false
  - name: threshold_percent
    type: Int32
    description: The alert threshold met (e.g., 80 or 100).
    optional: false
  - name: sent_at
    type: DateTime
    description: Timestamp when the notification email was sent.
    optional: false
methods: []
