schemaVersion: "1.0.0"
name: "gatekeeper-saas"
vision: >
  A highly scalable, low-latency API gateway gatekeeper and SaaS metering microservice.
  It intercepts incoming API calls, validates subscriber keys, performs sliding-window rate-limiting via Redis,
  tracks request quotas, and dispatches email/webhook alerts (at 80% and 100% usage) synchronized with Stripe billing states.
boundaries:
  - name: "gatekeeper"
    description: "Real-time ingress portal that handles API key lookup, rate-limiting, and request count incrementing."
  - name: "billing"
    description: "Out-of-band context managing Stripe customer syncing, subscription statuses, plans, and quota limits."
  - name: "notification"
    description: "Dispatch system sending warning and limit emails or webhook notifications to billing contacts."
globalRequirements:
  - description: "Hot-path key validation and rate limiting must execute in under 5ms (Redis cache hit)."
  - description: "Persistence of billing quotas must use PostgreSQL as the single source of truth."
  - description: "Notification dispatch must not add latency to the authorization hot-path response; warning dispatches run off the response path (spawned, fire-and-forget)."
