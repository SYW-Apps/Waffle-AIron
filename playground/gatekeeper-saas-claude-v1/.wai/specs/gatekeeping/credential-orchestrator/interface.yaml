id: icredential-orchestrator
name: Credential Orchestrator Interface
description: >-
  Issues and revokes API keys; delegates persistence to the credential repository. A key maps to a
  subscription only.
component: credential-orchestrator
methods:
  - name: issue_key
    description: Generate a key, store its hash mapped to the subscription, and return the plaintext once
    signature: 'async fn issue_key(&self, subscription_id: SubscriptionId) -> Result<IssuedKey, GateError>'
    returns: Result<IssuedKey, GateError>
  - name: revoke_key
    description: Mark an API key revoked
    signature: 'async fn revoke_key(&self, key_id: ApiKeyId) -> Result<(), GateError>'
    returns: Result<(), GateError>
status: draft
