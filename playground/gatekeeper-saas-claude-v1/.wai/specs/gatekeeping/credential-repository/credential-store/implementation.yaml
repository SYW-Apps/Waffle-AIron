id: credential-store-impl
name: Credential Store Implementation
description: Authoritative in-memory state with a primary id map and a key_hash secondary index.
contract: icredential-store
sourcePath: src/gatekeeping/credential_store.rs
methods:
  - name: insert
    narrative:
      - stepNumber: 1
        description: >-
          Insert or replace the credential in the id-keyed map and update the key_hash secondary
          index
        type: local
  - name: get_by_hash
    narrative:
      - stepNumber: 1
        description: >-
          Resolve the id via the key_hash secondary index, then return a clone of the credential if
          present
        type: local
  - name: get
    narrative:
      - stepNumber: 1
        description: Return a clone of the credential for the id if present
        type: local
  - name: set_status
    narrative:
      - stepNumber: 1
        description: >-
          If the credential exists, mutate its status in place and return true; otherwise return
          false
        type: local
status: complete
