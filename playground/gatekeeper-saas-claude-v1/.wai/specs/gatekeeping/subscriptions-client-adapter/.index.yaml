id: subscriptions-client-adapter
name: Subscriptions Client Adapter
description: >-
  Local client adapter that crosses the boundary into the subscriptions subsystem, calling its
  inbound Portal's published resolve_entitlements endpoint to fetch entitlements for a subscription.
  The only gatekeeping block allowed to call subscriptions. Maps subscription errors into gate
  errors.
subsystem: gatekeeping
componentType: Adapter
owns: []
dependsOn:
  - subscriptions-portal
status: complete
