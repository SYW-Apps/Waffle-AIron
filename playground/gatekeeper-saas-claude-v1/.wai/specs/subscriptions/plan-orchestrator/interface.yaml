id: iplan-orchestrator
name: Plan Orchestrator Interface
description: Plan catalog workflow coordination; delegates persistence to the plan repository.
component: plan-orchestrator
methods:
  - name: create_plan
    description: Validate and persist a new plan
    signature: 'async fn create_plan(&self, plan: Plan) -> Result<Plan, SubscriptionError>'
    returns: Result<Plan, SubscriptionError>
  - name: get_plan
    description: Fetch a plan or NotFound
    signature: 'async fn get_plan(&self, id: PlanId) -> Result<Plan, SubscriptionError>'
    returns: Result<Plan, SubscriptionError>
  - name: list_plans
    description: List catalog plans
    signature: async fn list_plans(&self) -> Result<Vec<Plan>, SubscriptionError>
    returns: Result<Vec<Plan>, SubscriptionError>
  - name: update_tier_limits
    description: Update a tier's limit set and return the refreshed plan
    signature: >-
      async fn update_tier_limits(&self, plan_id: PlanId, tier_id: TierId, limits: LimitSet) ->
      Result<Plan, SubscriptionError>
    returns: Result<Plan, SubscriptionError>
status: draft
