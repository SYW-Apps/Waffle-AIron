id: subscriptions-portal
name: Subscriptions Portal
description: >-
  HTTP/JSON ingress for /v1/plans and /v1/subscriptions management, plus the published
  resolve_entitlements read used cross-subsystem. Forwards validated requests to the plan and
  subscription orchestrators and the entitlement resolver. The subscriptions subsystem's inbound
  front door. Never touches stores, repositories, or adapters directly.
subsystem: subscriptions
componentType: Portal
owns: []
