id: istripe-adapter
name: Stripe Adapter Interface
description: >-
  The only block doing Stripe I/O. Manages customers and subscriptions in Stripe and verifies/parses
  webhook signatures.
component: stripe-adapter
methods:
  - name: create_customer
    description: Create a Stripe customer for a billing email
    signature: 'async fn create_customer(&self, email: Email) -> Result<StripeCustomerRef, StripeError>'
    returns: Result<StripeCustomerRef, StripeError>
  - name: create_subscription
    description: Create a subscription in Stripe for a customer at a price
    signature: >-
      async fn create_subscription(&self, stripe_customer_id: String, price_id: String) ->
      Result<StripeSubscriptionRef, StripeError>
    returns: Result<StripeSubscriptionRef, StripeError>
  - name: update_subscription
    description: Move a Stripe subscription to a new price
    signature: >-
      async fn update_subscription(&self, stripe_subscription_id: String, price_id: String) ->
      Result<StripeSubscriptionRef, StripeError>
    returns: Result<StripeSubscriptionRef, StripeError>
  - name: cancel_subscription
    description: Cancel a Stripe subscription
    signature: 'async fn cancel_subscription(&self, stripe_subscription_id: String) -> Result<(), StripeError>'
    returns: Result<(), StripeError>
  - name: verify_and_parse_event
    description: Verify the webhook signature and parse into a typed StripeEvent
    signature: >-
      fn verify_and_parse_event(&self, raw_body: Vec<u8>, signature: String) -> Result<StripeEvent,
      StripeError>
    returns: Result<StripeEvent, StripeError>
status: draft
