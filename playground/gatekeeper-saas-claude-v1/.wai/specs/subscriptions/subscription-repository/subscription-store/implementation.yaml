id: subscription-store-impl
name: Subscription Store Implementation
description: >-
  Authoritative in-memory subscription state with an account secondary index and processed-event
  set.
contract: isubscription-store
sourcePath: src/subscriptions/subscription_store.rs
methods:
  - name: insert
    narrative:
      - stepNumber: 1
        description: >-
          Insert or replace the subscription in the id map and update the billing-account secondary
          index
        type: local
  - name: get
    narrative:
      - stepNumber: 1
        description: Return a clone of the subscription for the id if present
        type: local
  - name: get_by_account
    narrative:
      - stepNumber: 1
        description: Resolve the id via the account secondary index and return a clone if present
        type: local
  - name: set_tier
    narrative:
      - stepNumber: 1
        description: If present, mutate the tier_id and return true, else false
        type: local
  - name: set_status
    narrative:
      - stepNumber: 1
        description: If present, mutate status and current_period_end and return true, else false
        type: local
  - name: record_event
    narrative:
      - stepNumber: 1
        description: Insert the event id into the processed-event set; return false if already present
        type: local
  - name: has_event
    narrative:
      - stepNumber: 1
        description: Return whether the event id is in the processed-event set
        type: local
status: draft
createdAt: '2026-06-17T18:37:17.229Z'
updatedAt: '2026-06-17T18:37:17.229Z'
