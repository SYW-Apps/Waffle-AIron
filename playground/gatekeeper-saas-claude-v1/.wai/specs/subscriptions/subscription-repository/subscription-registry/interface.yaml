id: isubscription-registry
name: Subscription Registry Interface
description: >-
  Write path for the Subscription aggregate: applies mutations to the store and persists via the
  Postgres adapter. Stripe-event application is idempotent via the processed-event unique
  constraint.
component: subscription-registry
methods:
  - name: create_subscription
    description: Insert into store and upsert via adapter
    signature: 'async fn create_subscription(&self, sub: Subscription) -> Result<(), SubscriptionError>'
    returns: Result<(), SubscriptionError>
  - name: set_tier
    description: Apply tier change to store and persist
    signature: 'async fn set_tier(&self, id: SubscriptionId, tier_id: TierId) -> Result<(), SubscriptionError>'
    returns: Result<(), SubscriptionError>
  - name: set_status
    description: Apply status/period change to store and persist
    signature: >-
      async fn set_status(&self, id: SubscriptionId, status: SubscriptionStatus, current_period_end:
      String) -> Result<(), SubscriptionError>
    returns: Result<(), SubscriptionError>
  - name: mark_event_processed
    description: >-
      Record the event id (unique constraint) and apply the status change; returns false if the
      event id was already processed. Idempotent: a duplicate event id is rejected at insert and
      applies no change.
    signature: >-
      async fn mark_event_processed(&self, id: SubscriptionId, event_id: String, status:
      SubscriptionStatus, current_period_end: String) -> Result<bool, SubscriptionError>
    returns: Result<bool, SubscriptionError>
    guarantees:
      - idempotent
status: complete
