id: billing-account-client-adapter
name: Billing Account Client Adapter
description: >-
  Local client adapter that crosses into the accounts subsystem, calling its inbound Portal's
  published resolve_billing_email endpoint to read the billing email for a billing account (used to
  provision the Stripe customer). The only subscriptions block allowed to call accounts. Maps
  account errors into subscription errors.
subsystem: subscriptions
componentType: Adapter
owns: []
dependsOn:
  - accounts-portal
status: complete
