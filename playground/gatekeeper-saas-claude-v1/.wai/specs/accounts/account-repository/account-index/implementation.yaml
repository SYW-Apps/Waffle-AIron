    narrative:
      - stepNumber: 1
        description: Read the aggregate by customer id
        type: call
        targetComponent: account-store
        targetMethod: get_by_customer
      - stepNumber: 2
        description: Extract and return the Customer, or None
        type: local
  - name: resolve_billing_email
    narrative:
      - stepNumber: 1
        description: Read the aggregate by billing account id
        type: call
        targetComponent: account-store
        targetMethod: get
      - stepNumber: 2
        description: Return the billing_account.billing_email, or None
        type: local
