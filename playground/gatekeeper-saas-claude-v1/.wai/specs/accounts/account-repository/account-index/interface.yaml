id: iaccount-index
name: Account Index Interface
description: Read path projecting the account store. Never mutates.
component: account-index
methods:
  - name: find_account
    description: Look up the full aggregate by billing account id
    signature: 'fn find_account(&self, id: BillingAccountId) -> Option<Account>'
    returns: Option<Account>
  - name: find_customer
    description: Look up a customer by id
    signature: 'fn find_customer(&self, id: CustomerId) -> Option<Customer>'
    returns: Option<Customer>
  - name: resolve_billing_email
    description: Resolve the billing email for an account
    signature: 'fn resolve_billing_email(&self, id: BillingAccountId) -> Option<Email>'
    returns: Option<Email>
