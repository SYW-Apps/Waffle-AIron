id: usage-reconciler-impl
name: Usage Reconciler Implementation
description: Periodic loop flushing Redis counters into Postgres rollups.
contract: iusage-reconciler
sourcePath: src/metering/usage_reconciler.rs
methods:
  - name: run
    narrative:
      - stepNumber: 1
        description: 'Enter the live loop: wait for the configured reconcile interval (tokio interval)'
        type: local
      - stepNumber: 2
        description: On each tick, perform one reconcile pass (see reconcile_once) and continue until shutdown
        type: local
  - name: reconcile_once
    narrative:
      - stepNumber: 1
        description: Snapshot all live usage counters from Redis
        type: call
        targetComponent: redis-counter-adapter
        targetMethod: snapshot_all
      - stepNumber: 2
        description: For each snapshot, derive its period from the window
        type: local
      - stepNumber: 3
        description: >-
          For each snapshot, reconcile its used value into the authoritative period rollup
          (idempotent)
        type: call
        targetComponent: usage-rollup-repository
        targetMethod: record_usage
      - stepNumber: 4
        description: Return the number of counters flushed
        type: local
status: draft
createdAt: '2026-06-17T18:39:13.229Z'
updatedAt: '2026-06-17T18:39:13.229Z'
