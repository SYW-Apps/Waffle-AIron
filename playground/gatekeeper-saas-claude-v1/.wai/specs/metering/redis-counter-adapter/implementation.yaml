id: redis-counter-adapter-impl
name: Redis Counter Adapter Implementation
description: deadpool-redis atomic counter ops; counter stores cumulative USED per window.
contract: iredis-counter-adapter
sourcePath: src/metering/redis_counter_adapter.rs
methods:
  - name: check_and_decrement
    narrative:
      - stepNumber: 1
        description: >-
          Run a Lua script: seed the key to 0 with the TTL if absent, INCRBY amount, and if the new
          value exceeds quota DECRBY amount back and flag denied
        type: local
      - stepNumber: 2
        description: >-
          Compute used and remaining (quota - used) and build the ConsumeOutcome {allowed, used,
          remaining}
        type: local
  - name: get
    narrative:
      - stepNumber: 1
        description: GET the counter value for the key and return it as Option<i64>
        type: local
  - name: snapshot_all
    narrative:
      - stepNumber: 1
        description: >-
          SCAN counter keys, parse subscription/resource/window from each key, read values, and
          build CounterSnapshots
        type: local
  - name: try_mark_threshold
    narrative:
      - stepNumber: 1
        description: >-
          SET a threshold-flag key with NX (set-if-absent) and the TTL; return true only if it was
          newly set
        type: local
status: draft
