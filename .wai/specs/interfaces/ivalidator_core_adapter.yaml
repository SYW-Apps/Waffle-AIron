schemaVersion: "1.0.0"
id: "ivalidator_core_adapter"
name: "Validator Core Adapter Interface"
description: "Adapter contract for validator to load specs from core portal."
component: "validator_core_adapter"
methods:
  - name: "loadSystemSpec"
    description: "Loads the system spec via core portal"
    signature: "loadSystemSpec(): SystemSpec | null"
