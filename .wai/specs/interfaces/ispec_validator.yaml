schemaVersion: "1.0.0"
id: "ispec_validator"
name: "Spec Validator Interface"
description: "Interface contract for validating spec tree hierarchies, registry ownerships, and project configs."
component: "spec_validator"
methods:
  - name: "validateSddTree"
    description: "Performs full SDD spec tree structural validation and returns results"
    signature: "validateSddTree(): ValidationResult"
    returns: "ValidationResult"
  - name: "validateRegistry"
    description: "Validates legacy/resolved Agent registry constraints"
    signature: "validateRegistry(registry: Registry, rules: RulesConfig): ValidationResult"
    returns: "ValidationResult"
  - name: "validateProjectConfig"
    description: "Validates project.yaml configuration file structure"
    signature: "validateProjectConfig(config: ProjectConfig): ValidationResult"
    returns: "ValidationResult"
