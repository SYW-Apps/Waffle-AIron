schemaVersion: "1.0.0"
id: "ispec_loader"
name: "Spec Loader Interface"
description: "Interface contract for spec loading, saving, and resolving."
component: "spec_loader"
methods:
  - name: "loadSystemSpec"
    description: "Loads L0 system specification from system.yaml"
    signature: "loadSystemSpec(): SystemSpec | null"
    returns: "SystemSpec | null"
  - name: "saveSystemSpec"
    description: "Saves L0 system specification to system.yaml"
    signature: "saveSystemSpec(spec: SystemSpec): void"
    returns: "void"
  - name: "loadSubsystemSpecs"
    description: "Loads all L1 subsystem specifications from subsystems/*.yaml"
    signature: "loadSubsystemSpecs(): SubsystemSpec[]"
    returns: "SubsystemSpec[]"
  - name: "loadSubsystemSpec"
    description: "Loads a single subsystem specification by id"
    signature: "loadSubsystemSpec(id: string): SubsystemSpec | null"
    returns: "SubsystemSpec | null"
  - name: "saveSubsystemSpec"
    description: "Saves a subsystem specification"
    signature: "saveSubsystemSpec(spec: SubsystemSpec): void"
    returns: "void"
  - name: "loadComponentSpecs"
    description: "Loads all L2 component specifications from components/*.yaml"
    signature: "loadComponentSpecs(): ComponentSpec[]"
    returns: "ComponentSpec[]"
  - name: "loadComponentSpec"
    description: "Loads a single component specification by id"
    signature: "loadComponentSpec(id: string): ComponentSpec | null"
    returns: "ComponentSpec | null"
  - name: "saveComponentSpec"
    description: "Saves a component specification"
    signature: "saveComponentSpec(spec: ComponentSpec): void"
    returns: "void"
  - name: "loadInterfaceSpecs"
    description: "Loads all L3 interface specifications from interfaces/*.yaml"
    signature: "loadInterfaceSpecs(): InterfaceSpec[]"
    returns: "InterfaceSpec[]"
  - name: "loadInterfaceSpec"
    description: "Loads a single interface specification by id"
    signature: "loadInterfaceSpec(id: string): InterfaceSpec | null"
    returns: "InterfaceSpec | null"
  - name: "saveInterfaceSpec"
    description: "Saves an interface specification"
    signature: "saveInterfaceSpec(spec: InterfaceSpec): void"
    returns: "void"
  - name: "loadImplementationSpecs"
    description: "Loads all L4 implementation specifications from implementations/*.yaml"
    signature: "loadImplementationSpecs(): ImplementationSpec[]"
    returns: "ImplementationSpec[]"
  - name: "loadImplementationSpec"
    description: "Loads a single implementation specification by id"
    signature: "loadImplementationSpec(id: string): ImplementationSpec | null"
    returns: "ImplementationSpec | null"
  - name: "saveImplementationSpec"
    description: "Saves an implementation specification"
    signature: "saveImplementationSpec(spec: ImplementationSpec): void"
    returns: "void"
