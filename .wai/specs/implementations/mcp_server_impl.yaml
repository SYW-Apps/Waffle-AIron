schemaVersion: "1.0.0"
id: "mcp_server_impl"
name: "MCP Server Implementation"
description: "Concrete implementation of the MCP Server Interface using the @modelcontextprotocol/sdk."
contract: "imcp_server"
sourcePath: "src/mcp/server.ts"
methods:
  - name: "createMcpServer"
    narrative:
      - stepNumber: 1
        description: "Instantiate McpServer with name 'wairon' and version"
        type: "local"
      - stepNumber: 2
        description: "Register tool 'listAgents' which resolves dynamic agent topology using agent_resolver"
        type: "call"
        targetComponent: "agent_resolver"
        targetMethod: "resolveAgentTopology"
      - stepNumber: 3
        description: "Register tool 'getAgent' which retrieves a single resolved agent's details"
        type: "call"
        targetComponent: "agent_resolver"
        targetMethod: "resolveAgentTopology"
      - stepNumber: 4
        description: "Register validation tools executing validateSddTree"
        type: "call"
        targetComponent: "spec_validator"
        targetMethod: "validateSddTree"
      - stepNumber: 5
        description: "Register loader tools to fetch system, subsystem, and component specs from spec_loader"
        type: "call"
        targetComponent: "spec_loader"
        targetMethod: "loadSystemSpec"
      - stepNumber: 6
        description: "Return configured McpServer instance"
        type: "local"
