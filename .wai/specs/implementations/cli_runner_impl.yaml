schemaVersion: "1.0.0"
id: "cli_runner_impl"
name: "CLI Runner Implementation"
description: "Concrete implementation of the CLI Runner Interface mapping commander subcommands to core engine logic."
contract: "icli_runner"
sourcePath: "src/cli/index.ts"
methods:
  - name: "runInit"
    narrative:
      - stepNumber: 1
        description: "Verify if workspace is already initialized"
        type: "local"
      - stepNumber: 2
        description: "Bootstrap standard .wai directory structure"
        type: "local"
      - stepNumber: 3
        description: "Export SDD skills templates"
        type: "call"
        targetComponent: "skills_exporter"
        targetMethod: "exportSddSkills"
      - stepNumber: 4
        description: "Generate default L0/L1/L2 spec files if empty"
        type: "local"
  - name: "runValidate"
    narrative:
      - stepNumber: 1
        description: "Load project configuration file"
        type: "local"
      - stepNumber: 2
        description: "Validate registry rules"
        type: "call"
        targetComponent: "spec_validator"
        targetMethod: "validateRegistry"
      - stepNumber: 3
        description: "Validate project configuration"
        type: "call"
        targetComponent: "spec_validator"
        targetMethod: "validateProjectConfig"
      - stepNumber: 4
        description: "Validate SDD specification tree"
        type: "call"
        targetComponent: "spec_validator"
        targetMethod: "validateSddTree"
      - stepNumber: 5
        description: "Print validation errors/warnings and exit process if invalid"
        type: "local"
  - name: "runGenerate"
    narrative:
      - stepNumber: 1
        description: "Load spec system"
        type: "call"
        targetComponent: "spec_loader"
        targetMethod: "loadSystemSpec"
      - stepNumber: 2
        description: "Generate Dynamic Agent outputs matching configured target engines"
        type: "local"
  - name: "runList"
    narrative:
      - stepNumber: 1
        description: "Load specs using spec loader"
        type: "call"
        targetComponent: "spec_loader"
        targetMethod: "loadSystemSpec"
      - stepNumber: 2
        description: "Format and print resolved dynamic agent list to stdout"
        type: "local"
  - name: "runShow"
    narrative:
      - stepNumber: 1
        description: "Load spec system"
        type: "call"
        targetComponent: "spec_loader"
        targetMethod: "loadSystemSpec"
      - stepNumber: 2
        description: "Format and display details for specified dynamic agent"
        type: "local"
  - name: "runUpdate"
    narrative:
      - stepNumber: 1
        description: "Check remote github release page for new releases"
        type: "local"
      - stepNumber: 2
        description: "If new release is found and not in check-only mode, pull and apply updates"
        type: "local"
createdAt: "2026-06-11T14:50:00Z"
updatedAt: "2026-06-11T14:50:00Z"
